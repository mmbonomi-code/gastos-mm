<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gastos M&M">
<meta name="theme-color" content="#0f0f0f">
<title>Gastos M&amp;M</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #c8f264;
    --accent-dim: rgba(200,242,100,0.12);
    --accent-dark: #8fb840;
    --red: #ff5c5c;
    --red-dim: rgba(255,92,92,0.12);
    --marcos: #64b5f6;
    --marcos-dim: rgba(100,181,246,0.15);
    --mary: #f48fb1;
    --mary-dim: rgba(244,143,177,0.15);
    --radius: 14px;
    --radius-sm: 8px;
    --font: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; overflow: hidden; }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; }
  #header { padding: 52px 20px 16px; flex-shrink: 0; }
  #header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  #header h1 span { color: var(--accent); }
  #header .subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; font-family: var(--mono); }

  #nav { display: flex; gap: 4px; padding: 0 20px 16px; flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 9px 4px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text2); font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .nav-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 600; }

  #content { flex: 1; overflow-y: auto; padding: 0 20px 120px; }

  /* Vistas */
  .vista { display: none; }
  .vista.active { display: block; }

  /* === VISTA: CARGAR === */
  .form-section { margin-bottom: 24px; }
  .form-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .amount-display { font-size: 52px; font-weight: 300; font-family: var(--mono); color: var(--text); letter-spacing: -2px; min-height: 64px; line-height: 1; }
  .amount-display.has-value { color: var(--accent); }
  .amount-display span.cursor { animation: blink 1s step-end infinite; color: var(--text3); }
  @keyframes blink { 50% { opacity: 0; } }

  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .numpad-btn { padding: 18px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); font-family: var(--mono); font-size: 20px; font-weight: 500; cursor: pointer; transition: all 0.1s; text-align: center; }
  .numpad-btn:active { background: var(--bg3); transform: scale(0.96); }
  .numpad-btn.del { font-size: 16px; color: var(--text2); }

  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 8px 14px; border: 0.5px solid var(--border); border-radius: 100px; background: var(--bg2); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .chip.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .chip.marcos { }
  .chip.marcos.selected { border-color: var(--marcos); background: var(--marcos-dim); color: var(--marcos); }
  .chip.mary.selected { border-color: var(--mary); background: var(--mary-dim); color: var(--mary); }

  .text-input { width: 100%; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.15s; }
  .text-input:focus { border-color: var(--border2); }
  .text-input::placeholder { color: var(--text3); }

  .date-row { display: flex; align-items: center; gap: 10px; }
  .date-row .text-input { flex: 1; }
  .date-today-btn { padding: 12px 14px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; font-family: var(--font); }
  .date-today-btn:active { background: var(--bg3); }

  .submit-btn { width: 100%; padding: 16px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .submit-btn:active { transform: scale(0.98); background: var(--accent-dark); }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* === VISTA: HISTORIAL === */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-bar select { flex: 1; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; cursor: pointer; }

  .gasto-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
  .gasto-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .gasto-info { flex: 1; min-width: 0; }
  .gasto-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gasto-meta { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: var(--mono); }
  .gasto-right { text-align: right; flex-shrink: 0; }
  .gasto-monto { font-size: 15px; font-weight: 500; font-family: var(--mono); }
  .gasto-quien { font-size: 11px; margin-top: 2px; font-family: var(--mono); }
  .gasto-quien.marcos { color: var(--marcos); }
  .gasto-quien.mary { color: var(--mary); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

  .section-date { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; padding: 16px 0 8px; }

  /* === VISTA: REPORTES === */
  .period-toggle { display: flex; gap: 4px; margin-bottom: 20px; }
  .period-btn { flex: 1; padding: 9px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text2); font-family: var(--font); font-size: 13px; cursor: pointer; }
  .period-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  .period-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .period-nav button { width: 36px; height: 36px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .period-nav .period-label { font-size: 14px; font-weight: 500; }

  .total-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .total-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .total-amount { font-size: 36px; font-weight: 300; font-family: var(--mono); color: var(--accent); letter-spacing: -1px; }
  .total-sub { display: flex; gap: 16px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .total-sub-item { flex: 1; }
  .total-sub-label { font-size: 11px; font-family: var(--mono); margin-bottom: 3px; }
  .total-sub-label.marcos { color: var(--marcos); }
  .total-sub-label.mary { color: var(--mary); }
  .total-sub-val { font-size: 16px; font-weight: 500; font-family: var(--mono); }

  .cat-list { }
  .cat-item { margin-bottom: 12px; }
  .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .cat-name { font-size: 13px; color: var(--text2); }
  .cat-amount { font-size: 13px; font-family: var(--mono); font-weight: 500; }
  .cat-pct { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .bar-track { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* Setup modal */
  #setup-modal { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; justify-content: center; padding: 32px 24px; max-width: 480px; margin: 0 auto; }
  #setup-modal h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  #setup-modal h2 span { color: var(--accent); }
  #setup-modal p { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  #setup-modal .url-input-wrap { margin-bottom: 12px; }
  #setup-modal label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
  .setup-save-btn { width: 100%; padding: 16px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; }

  /* Toast */
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text); padding: 12px 20px; border-radius: 100px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 50; max-width: calc(100% - 40px); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--accent); color: var(--accent); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* Loading spinner */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  #content::-webkit-scrollbar { width: 4px; }
  #content::-webkit-scrollbar-track { background: transparent; }
  #content::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* Delete swipe hint */
  .gasto-item { position: relative; overflow: hidden; }
  .delete-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--red-dim); border: 0.5px solid var(--red); color: var(--red); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 12px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
  .gasto-item:hover .delete-btn, .gasto-item.show-delete .delete-btn { opacity: 1; }
</style>
</head>
<body>

<!-- Setup Modal -->
<div id="setup-modal">
  <h2>Gastos <span>M&M</span></h2>
  <p>Pegá la URL de tu Google Apps Script para conectar la app con tu planilla.</p>
  <div class="url-input-wrap">
    <label>URL del Apps Script</label>
    <input type="url" id="script-url-input" class="text-input" placeholder="https://script.google.com/macros/s/..." style="font-size:13px;">
  </div>
  <button class="setup-save-btn" onclick="saveSetup()">Conectar →</button>
</div>

<div id="app" style="display:none;">
  <div id="header">
    <h1>Gastos <span>M&M</span></h1>
    <div class="subtitle" id="header-subtitle">cargando...</div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="showVista('cargar')">+ Cargar</button>
    <button class="nav-btn" onclick="showVista('historial')">Historial</button>
    <button class="nav-btn" onclick="showVista('reportes')">Reportes</button>
  </div>
  <div id="content">

    <!-- CARGAR -->
    <div id="vista-cargar" class="vista active">
      <div class="form-section">
        <div class="form-label">Monto</div>
        <div class="amount-display" id="amount-display"><span class="cursor">|</span></div>
        <div class="numpad" id="numpad">
          <button class="numpad-btn" onclick="numInput('1')">1</button>
          <button class="numpad-btn" onclick="numInput('2')">2</button>
          <button class="numpad-btn" onclick="numInput('3')">3</button>
          <button class="numpad-btn" onclick="numInput('4')">4</button>
          <button class="numpad-btn" onclick="numInput('5')">5</button>
          <button class="numpad-btn" onclick="numInput('6')">6</button>
          <button class="numpad-btn" onclick="numInput('7')">7</button>
          <button class="numpad-btn" onclick="numInput('8')">8</button>
          <button class="numpad-btn" onclick="numInput('9')">9</button>
          <button class="numpad-btn" onclick="numInput('000')">000</button>
          <button class="numpad-btn" onclick="numInput('0')">0</button>
          <button class="numpad-btn del" onclick="numDel()">⌫</button>
        </div>
      </div>

      <div class="form-section">
        <div class="form-label">Descripción</div>
        <input type="text" id="descripcion" class="text-input" placeholder="ej: Carrefour semanal">
      </div>

      <div class="form-section">
        <div class="form-label">Fecha</div>
        <div class="date-row">
          <input type="date" id="fecha" class="text-input">
          <button class="date-today-btn" onclick="setToday()">Hoy</button>
        </div>
      </div>

      <div class="form-section">
        <div class="form-label">Categoría</div>
        <div class="chip-group" id="categorias-chips"></div>
      </div>

      <div class="form-section">
        <div class="form-label">Medio de pago</div>
        <div class="chip-group" id="medios-chips"></div>
      </div>

      <div class="form-section">
        <div class="form-label">¿Quién pagó?</div>
        <div class="chip-group">
          <button class="chip marcos" id="chip-marcos" onclick="selectQuien('Marcos')">Marcos</button>
          <button class="chip mary" id="chip-mary" onclick="selectQuien('Mary')">Mary</button>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitGasto()">Guardar gasto</button>
    </div>

    <!-- HISTORIAL -->
    <div id="vista-historial" class="vista">
      <div class="filter-bar">
        <select id="filter-quien" onchange="renderHistorial()">
          <option value="">Todos</option>
          <option value="Marcos">Marcos</option>
          <option value="Mary">Mary</option>
        </select>
        <select id="filter-cat" onchange="renderHistorial()">
          <option value="">Todas las categorías</option>
        </select>
      </div>
      <div id="historial-list"></div>
    </div>

    <!-- REPORTES -->
    <div id="vista-reportes" class="vista">
      <div class="period-toggle">
        <button class="period-btn active" id="period-mes" onclick="setPeriod('mes')">Mensual</button>
        <button class="period-btn" id="period-sem" onclick="setPeriod('semana')">Semanal</button>
      </div>
      <div class="period-nav">
        <button onclick="navPeriod(-1)">‹</button>
        <span class="period-label" id="period-label"></span>
        <button onclick="navPeriod(1)">›</button>
      </div>
      <div id="reportes-content"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
let SCRIPT_URL = localStorage.getItem('gastos_script_url') || '';
let config = { categorias: [], medios: [] };
let gastos = [];
let amountStr = '';
let selectedCat = '';
let selectedMedio = '';
let selectedQuien = '';
let periodMode = 'mes';
let periodOffset = 0;

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  setToday();
  if (SCRIPT_URL) {
    document.getElementById('setup-modal').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    init();
  } else {
    document.getElementById('setup-modal').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

async function init() {
  try {
    await loadConfig();
    await loadGastos();
    updateHeaderSubtitle();
  } catch(e) {
    toast('Error al conectar con la planilla', 'error');
  }
}

async function loadConfig() {
  const r = await fetch(`${SCRIPT_URL}?action=getConfig`);
  const data = await r.json();
  config = data;
  renderCategoriaChips();
  renderMedioChips();
  renderFilterCatOptions();
}

async function loadGastos() {
  const r = await fetch(`${SCRIPT_URL}?action=getGastos`);
  const data = await r.json();
  gastos = data.gastos || [];
}

// ============================================================
// SETUP
// ============================================================
function saveSetup() {
  const url = document.getElementById('script-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) {
    toast('URL inválida', 'error');
    return;
  }
  SCRIPT_URL = url;
  localStorage.setItem('gastos_script_url', url);
  document.getElementById('setup-modal').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  init();
}

// ============================================================
// NAVIGATION
// ============================================================
function showVista(name) {
  document.querySelectorAll('.vista').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`vista-${name}`).classList.add('active');
  const btns = document.querySelectorAll('.nav-btn');
  const idx = ['cargar','historial','reportes'].indexOf(name);
  btns[idx].classList.add('active');
  if (name === 'historial') renderHistorial();
  if (name === 'reportes') renderReportes();
}

// ============================================================
// NUMPAD
// ============================================================
function numInput(val) {
  if (amountStr.length >= 10) return;
  if (val === '000' && amountStr === '') return;
  if (amountStr === '0') amountStr = '';
  amountStr += val;
  updateAmountDisplay();
}

function numDel() {
  amountStr = amountStr.slice(0, -1);
  updateAmountDisplay();
}

function updateAmountDisplay() {
  const el = document.getElementById('amount-display');
  if (!amountStr) {
    el.innerHTML = '<span class="cursor">|</span>';
    el.classList.remove('has-value');
  } else {
    const num = parseInt(amountStr);
    el.textContent = '$' + num.toLocaleString('es-AR');
    el.classList.add('has-value');
  }
}

// ============================================================
// CHIPS
// ============================================================
function renderCategoriaChips() {
  const el = document.getElementById('categorias-chips');
  el.innerHTML = config.categorias.map(c =>
    `<button class="chip" onclick="selectCat('${c}')" id="chip-cat-${c.replace(/[^a-z]/gi,'_')}">${c}</button>`
  ).join('');
}

function renderMedioChips() {
  const el = document.getElementById('medios-chips');
  el.innerHTML = config.medios.map(m =>
    `<button class="chip" onclick="selectMedio('${m}')" id="chip-medio-${m.replace(/[^a-z]/gi,'_')}">${m}</button>`
  ).join('');
}

function selectCat(cat) {
  selectedCat = cat;
  document.querySelectorAll('#categorias-chips .chip').forEach(c => c.classList.remove('selected'));
  const id = 'chip-cat-' + cat.replace(/[^a-z]/gi,'_');
  const el = document.getElementById(id);
  if (el) el.classList.add('selected');
}

function selectMedio(medio) {
  selectedMedio = medio;
  document.querySelectorAll('#medios-chips .chip').forEach(c => c.classList.remove('selected'));
  const id = 'chip-medio-' + medio.replace(/[^a-z]/gi,'_');
  const el = document.getElementById(id);
  if (el) el.classList.add('selected');
}

function selectQuien(quien) {
  selectedQuien = quien;
  document.getElementById('chip-marcos').classList.toggle('selected', quien === 'Marcos');
  document.getElementById('chip-mary').classList.toggle('selected', quien === 'Mary');
}

// ============================================================
// DATE
// ============================================================
function setToday() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('fecha').value = `${yyyy}-${mm}-${dd}`;
}

// ============================================================
// SUBMIT
// ============================================================
async function submitGasto() {
  const monto = parseInt(amountStr);
  const descripcion = document.getElementById('descripcion').value.trim();
  const fecha = document.getElementById('fecha').value;

  if (!monto || monto <= 0) { toast('Ingresá un monto', 'error'); return; }
  if (!descripcion) { toast('Ingresá una descripción', 'error'); return; }
  if (!selectedCat) { toast('Seleccioná una categoría', 'error'); return; }
  if (!selectedMedio) { toast('Seleccioná el medio de pago', 'error'); return; }
  if (!selectedQuien) { toast('Seleccioná quién pagó', 'error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Guardando...';

  try {
    const r = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addGasto',
        fecha, descripcion,
        monto, categoria: selectedCat,
        medioPago: selectedMedio, quienPago: selectedQuien
      })
    });
    const data = await r.json();
    if (data.success) {
      toast('Gasto guardado ✓', 'success');
      resetForm();
      await loadGastos();
    } else {
      toast('Error: ' + (data.error || 'desconocido'), 'error');
    }
  } catch(e) {
    toast('Error de conexión', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar gasto';
  }
}

  amountStr = '';
  updateAmountDisplay();
  document.getElementById('descripcion').value = '';
  setToday();
  selectedCat = '';
  selectedMedio = '';
  selectedQuien = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));

// ============================================================
// HISTORIAL
// ============================================================
const CAT_ICONS = {
  'Supermercado': '🛒', 'Restaurantes / Delivery': '🍔', 'Transporte': '🚗',
  'Servicios': '💡', 'Salud': '🏥', 'Ropa': '👕', 'Entretenimiento / Salidas': '🎬',
  'Viajes': '✈️', 'Hogar / Mantenimiento': '🏠', 'Educación': '📚',
  'Auto': '🔧', 'Suscripciones': '📱', 'Impuestos': '🧾'
};

function renderFilterCatOptions() {
  const sel = document.getElementById('filter-cat');
  config.categorias.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

function renderHistorial() {
  const filterQuien = document.getElementById('filter-quien').value;
  const filterCat = document.getElementById('filter-cat').value;

  let filtered = [...gastos];
  if (filterQuien) filtered = filtered.filter(g => g.quienPago === filterQuien);
  if (filterCat) filtered = filtered.filter(g => g.categoria === filterCat);

  const el = document.getElementById('historial-list');

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No hay gastos registrados</div>';
    return;
  }

  // Agrupar por fecha
  const byDate = {};
  filtered.forEach(g => {
    const d = g.fecha.toString().substring(0,10);
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(g);
  });

  let html = '';
  Object.keys(byDate).sort().reverse().forEach(date => {
    const label = formatDateLabel(date);
    html += `<div class="section-date">${label}</div>`;
    byDate[date].forEach(g => {
      const icon = CAT_ICONS[g.categoria] || '💰';
      const quien = g.quienPago.toLowerCase();
      html += `
        <div class="gasto-item" id="gasto-${g.id}" ontouchstart="touchStart(event,'${g.id}')" ontouchend="touchEnd(event,'${g.id}')">
          <div class="gasto-icon">${icon}</div>
          <div class="gasto-info">
            <div class="gasto-desc">${escHtml(g.descripcion)}</div>
            <div class="gasto-meta">${g.categoria} · ${g.medioPago}</div>
          </div>
          <div class="gasto-right">
            <div class="gasto-monto">$${Number(g.monto).toLocaleString('es-AR')}</div>
            <div class="gasto-quien ${quien}">${g.quienPago}</div>
          </div>
          <button class="delete-btn" onclick="deleteGasto('${g.id}')">✕</button>
        </div>`;
    });
  });

  el.innerHTML = html;
}

let touchStartX = 0;
function touchStart(e, id) {
  touchStartX = e.touches[0].clientX;
}
function touchEnd(e, id) {
  const dx = touchStartX - e.changedTouches[0].clientX;
  if (dx > 60) {
    document.getElementById(`gasto-${id}`)?.classList.add('show-delete');
  } else if (dx < -20) {
    document.getElementById(`gasto-${id}`)?.classList.remove('show-delete');
  }
}

async function deleteGasto(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  try {
    const r = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'deleteGasto', id })
    });
    const data = await r.json();
    if (data.success) {
      toast('Gasto eliminado', 'success');
      await loadGastos();
      renderHistorial();
    }
  } catch(e) {
    toast('Error al eliminar', 'error');
  }
}

// ============================================================
// REPORTES
// ============================================================
function setPeriod(mode) {
  periodMode = mode;
  periodOffset = 0;
  document.getElementById('period-mes').classList.toggle('active', mode === 'mes');
  document.getElementById('period-sem').classList.toggle('active', mode === 'semana');
  renderReportes();
}

function navPeriod(dir) {
  periodOffset += dir;
  renderReportes();
}

function renderReportes() {
  const { desde, hasta, label } = getPeriodRange();
  document.getElementById('period-label').textContent = label;

  const filtered = gastos.filter(g => {
    const d = g.fecha.toString().substring(0,10);
    return d >= desde && d <= hasta;
  });

  const total = filtered.reduce((s, g) => s + Number(g.monto), 0);
  const totalMarcos = filtered.filter(g => g.quienPago === 'Marcos').reduce((s,g) => s + Number(g.monto), 0);
  const totalMary = filtered.filter(g => g.quienPago === 'Mary').reduce((s,g) => s + Number(g.monto), 0);

  // Por categoría
  const byCat = {};
  filtered.forEach(g => {
    byCat[g.categoria] = (byCat[g.categoria] || 0) + Number(g.monto);
  });
  const catEntries = Object.entries(byCat).sort((a,b) => b[1]-a[1]);

  let catHtml = catEntries.map(([cat, monto]) => {
    const pct = total > 0 ? Math.round(monto / total * 100) : 0;
    const icon = CAT_ICONS[cat] || '💰';
    return `
      <div class="cat-item">
        <div class="cat-header">
          <span class="cat-name">${icon} ${cat}</span>
          <span>
            <span class="cat-amount">$${Math.round(monto).toLocaleString('es-AR')}</span>
            <span class="cat-pct"> ${pct}%</span>
          </span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');

  document.getElementById('reportes-content').innerHTML = `
    <div class="total-card">
      <div class="total-label">Total del período</div>
      <div class="total-amount">$${Math.round(total).toLocaleString('es-AR')}</div>
      <div class="total-sub">
        <div class="total-sub-item">
          <div class="total-sub-label marcos">Marcos</div>
          <div class="total-sub-val">$${Math.round(totalMarcos).toLocaleString('es-AR')}</div>
        </div>
        <div class="total-sub-item">
          <div class="total-sub-label mary">Mary</div>
          <div class="total-sub-val">$${Math.round(totalMary).toLocaleString('es-AR')}</div>
        </div>
      </div>
    </div>
    ${filtered.length === 0 ? '<div class="empty-state">Sin gastos en este período</div>' : catHtml}
  `;
}

function getPeriodRange() {
  const now = new Date();
  if (periodMode === 'mes') {
    const d = new Date(now.getFullYear(), now.getMonth() + periodOffset, 1);
    const desde = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    const hasta = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${lastDay}`;
    const label = d.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
    return { desde, hasta, label };
  } else {
    const d = new Date(now);
    d.setDate(d.getDate() + periodOffset * 7);
    const dow = d.getDay();
    const mon = new Date(d); mon.setDate(d.getDate() - ((dow+6)%7));
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const fmt = (dt) => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const label = `${mon.getDate()}/${mon.getMonth()+1} – ${sun.getDate()}/${sun.getMonth()+1}`;
    return { desde: fmt(mon), hasta: fmt(sun), label };
  }
}

// ============================================================
// UTILS
// ============================================================
function updateHeaderSubtitle() {
  const hoy = new Date().toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' });
  document.getElementById('header-subtitle').textContent = hoy;
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (d.getTime() === today.getTime()) return 'Hoy';
  if (d.getTime() === yesterday.getTime()) return 'Ayer';
  return d.toLocaleDateString('es-AR', { weekday:'short', day:'numeric', month:'short' });
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => { el.className = ''; }, 3000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
